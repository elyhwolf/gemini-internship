<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ely's Hot Chicken Focus Timer — Sponsored Pomodoro App</title>
  <meta name="description" content="A premium Pomodoro focus timer sponsored by Ely's Hot Chicken, with integrated task tracking, session stats, and fiery orange and lime green themes." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base: #06070a;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-card-hover: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.07);
      --border-bright: rgba(255, 255, 255, 0.14);

      /* Lime Green */
      --lime: #a3e635;
      --lime-light: #bef264;
      --lime-dim: rgba(163, 230, 53, 0.12);

      /* Fiery Orange */
      --orange: #f97316;
      --orange-light: #fdba74;
      --orange-dim: rgba(249, 115, 22, 0.15);

      /* Chili Red */
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.15);

      --text: #f8fafc;
      --text-muted: #94a3b8;
      --text-dim: #475569;

      --radius: 20px;
      --radius-sm: 12px;
      --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);

      /* Timer ring */
      --ring-size: 280px;
      --ring-stroke: 10;
      --ring-r: 125;
      --ring-circ: 785.4; /* 2*pi*125 */
    }

    html, body {
      height: 100%;
      background: var(--bg-base);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* ── Ambient Glow Background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 65% 55% at 15% 15%, rgba(249, 115, 22, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 55% 45% at 85% 85%, rgba(163, 230, 53, 0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--orange), var(--lime));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 15px rgba(249, 115, 22, 0.3);
    }

    .logo-text {
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .logo-text span { color: var(--lime); }

    .sponsor-badge {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--orange-light);
      background: rgba(249, 115, 22, 0.1);
      border: 1px solid rgba(249, 115, 22, 0.2);
      padding: 2px 8px;
      border-radius: 4px;
      align-self: flex-start;
      margin-top: 4px;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .lang-selector-group {
      display: flex;
      gap: 0.25rem;
      background: rgba(0, 0, 0, 0.4);
      padding: 0.25rem;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .lang-btn {
      padding: 0.35rem 0.7rem;
      font-size: 0.75rem;
      border-radius: 15px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 600;
      box-shadow: none;
      transition: all var(--transition);
    }

    .lang-btn.active {
      background: var(--orange);
      color: #000000;
    }

    /* ── Main grid ── */
    main {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 28px;
      padding: 28px 0;
      align-items: start;
    }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* ── Timer Section ── */
    .timer-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Mode tabs */
    .mode-tabs {
      display: flex;
      gap: 6px;
      background: rgba(0, 0, 0, 0.3);
      padding: 5px;
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    .mode-tab {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
      letter-spacing: 0.02em;
    }

    .mode-tab.active {
      background: var(--orange-dim);
      color: var(--orange-light);
      border: 1px solid rgba(249, 115, 22, 0.3);
    }

    .mode-tab.active[data-mode="short"] {
      background: var(--lime-dim);
      color: var(--lime);
      border-color: rgba(163, 230, 53, 0.3);
    }

    .mode-tab.active[data-mode="long"] {
      background: var(--lime-dim);
      color: var(--lime);
      border-color: rgba(163, 230, 53, 0.3);
    }

    .mode-tab:hover:not(.active) {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    /* Timer card */
    .timer-card {
      padding: 44px 32px 38px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      position: relative;
      overflow: hidden;
    }

    .timer-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.25), transparent 50%, rgba(163, 230, 53, 0.15));
      z-index: -1;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .timer-card.running::before { opacity: 1; }

    /* SVG Ring Timer */
    .ring-container {
      position: relative;
      width: var(--ring-size);
      height: var(--ring-size);
    }

    .ring-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.04);
      stroke-width: var(--ring-stroke);
    }

    .ring-progress {
      fill: none;
      stroke: var(--orange);
      stroke-width: var(--ring-stroke);
      stroke-linecap: round;
      stroke-dasharray: var(--ring-circ);
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.4s ease;
      filter: drop-shadow(0 0 10px var(--orange));
    }

    .ring-progress.short { stroke: var(--lime); filter: drop-shadow(0 0 10px var(--lime)); }
    .ring-progress.long  { stroke: var(--lime-light);  filter: drop-shadow(0 0 10px var(--lime-light));  }

    .timer-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .timer-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 3.8rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
      transition: color 0.3s;
    }

    .timer-mode-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
    }

    /* Pulse ring animation */
    @keyframes pulse-ring {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.15; transform: scale(1.04); }
    }

    .ring-pulse {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1px solid var(--orange);
      animation: pulse-ring 2s ease-in-out infinite;
      display: none;
    }

    .timer-card.running .ring-pulse { display: block; }

    /* Controls */
    .timer-controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .btn-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border-bright);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .btn-icon:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      border-color: var(--border-bright);
    }

    .btn-play {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--orange), #c2410c);
      color: white;
      font-size: 1.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      box-shadow: 0 0 25px rgba(249, 115, 22, 0.45), 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    .btn-play:hover {
      transform: scale(1.06);
      box-shadow: 0 0 38px rgba(249, 115, 22, 0.65), 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .btn-play:active { transform: scale(0.97); }

    /* Session dots */
    .session-dots {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .session-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: all var(--transition);
    }

    .session-dot.done {
      background: var(--orange);
      box-shadow: 0 0 8px var(--orange);
    }

    .session-dot.current {
      background: var(--orange-light);
      box-shadow: 0 0 10px var(--orange-light);
      animation: dot-pulse 1.5s ease-in-out infinite;
    }

    @keyframes dot-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    /* ── Task Panel ── */
    .task-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 0;
    }

    .panel-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .task-count-badge {
      background: var(--orange-dim);
      color: var(--orange-light);
      border: 1px solid rgba(249, 115, 22, 0.25);
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 9px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Add task */
    .add-task-form {
      padding: 0 16px;
      display: flex;
      gap: 8px;
    }

    .task-input {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: border-color var(--transition);
    }

    .task-input::placeholder { color: var(--text-dim); }

    .task-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px var(--orange-dim); }

    .btn-add {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--orange);
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      box-shadow: 0 2px 10px rgba(249, 115, 22, 0.35);
    }

    .btn-add:hover {
      background: var(--orange-light);
      transform: scale(1.05);
    }

    /* Task list */
    .task-list {
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 380px;
      overflow-y: auto;
    }

    .task-list::-webkit-scrollbar { width: 4px; }
    .task-list::-webkit-scrollbar-track { background: transparent; }
    .task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all var(--transition);
      animation: task-in 0.25s ease-out;
    }

    @keyframes task-in {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--border-bright); }

    .task-item.active-task {
      background: var(--orange-dim);
      border-color: rgba(249, 115, 22, 0.3);
    }

    .task-item.done {
      opacity: 0.45;
    }

    .task-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--text-dim);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      font-size: 0.65rem;
    }

    .task-item.done .task-check {
      background: var(--lime);
      border-color: var(--lime);
      color: #000;
      font-weight: 700;
      box-shadow: 0 0 8px rgba(163, 230, 53, 0.5);
    }

    .task-item.active-task .task-check {
      border-color: var(--orange-light);
      box-shadow: 0 0 8px rgba(249, 115, 22, 0.5);
    }

    .task-text {
      flex: 1;
      font-size: 0.85rem;
      line-height: 1.3;
      transition: all var(--transition);
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-pomodoros {
      font-size: 0.7rem;
      color: var(--orange-light);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .task-delete {
      opacity: 0;
      border: none;
      background: none;
      color: var(--text-dim);
      font-size: 0.9rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: all var(--transition);
      line-height: 1;
    }

    .task-item:hover .task-delete { opacity: 1; }
    .task-delete:hover { color: var(--red); background: rgba(239, 68, 68, 0.1); }

    .task-empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted);
      font-size: 0.82rem;
    }

    .task-empty-icon { font-size: 2rem; margin-bottom: 8px; opacity: 0.5; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 12px;
    }

    .stat-card {
      flex: 1;
      padding: 16px 18px;
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-icon { font-size: 1.15rem; margin-bottom: 2px; }

    .stat-val {
      font-size: 1.5rem;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .stat-lbl {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .stat-card.orange-theme { background: var(--orange-dim); border: 1px solid rgba(249, 115, 22, 0.2); }
    .stat-card.orange-theme .stat-val { color: var(--orange-light); }

    .stat-card.lime-theme { background: var(--lime-dim); border: 1px solid rgba(163, 230, 53, 0.2); }
    .stat-card.lime-theme .stat-val { color: var(--lime); }

    .stat-card.streak-theme { background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.2); }
    .stat-card.streak-theme .stat-val { color: var(--red); }

    /* ── Footer ── */
    footer {
      padding: 16px 0;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .kbd {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 7px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
    }

    /* ── Notification toast ── */
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: rgba(15, 15, 25, 0.95);
      border: 1px solid var(--border-bright);
      backdrop-filter: blur(20px);
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      z-index: 999;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Animations ── */
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .app > * { animation: fade-in 0.4s ease-out both; }
    main { animation-delay: 0.1s; }
    footer { animation-delay: 0.2s; }

    /* Responsive */
    @media (max-width: 720px) {
      main { grid-template-columns: 1fr; }
      :root { --ring-size: 240px; }
      .timer-display { font-size: 3rem; }
      .header-stats { display: none; }
      .stats-bar { display: grid; grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header>
    <div class="logo-container">
      <div class="logo">
        <div class="logo-icon">🍗</div>
        <div class="logo-text">Chrono<span>Focus</span></div>
      </div>
      <div class="sponsor-badge">Sponsored by Ely's Hot Chicken</div>
    </div>
    <div class="header-controls">
      <!-- Segmented Language Switcher -->
      <div class="lang-selector-group">
        <button type="button" id="lang-btn-en" class="lang-btn active" onclick="setLanguage('en')">🇺🇸 EN</button>
        <button type="button" id="lang-btn-es" class="lang-btn" onclick="setLanguage('es')">🇪🇸 ES</button>
        <button type="button" id="lang-btn-he" class="lang-btn" onclick="setLanguage('he')">🇮🇱 עב</button>
        <button type="button" id="lang-btn-xh" class="lang-btn" onclick="setLanguage('xh')">🇿🇦 XH</button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main>

    <!-- Left: Timer -->
    <div class="timer-section">

      <!-- Mode Tabs -->
      <div class="mode-tabs" role="tablist" aria-label="Timer mode">
        <button class="mode-tab active" data-mode="work"  id="tab-work"  role="tab" onclick="switchMode('work')">🍗 Focus</button>
        <button class="mode-tab"        data-mode="short" id="tab-short" role="tab" onclick="switchMode('short')">🥤 Short Break</button>
        <button class="mode-tab"        data-mode="long"  id="tab-long"  role="tab" onclick="switchMode('long')">🍨 Long Break</button>
      </div>

      <!-- Timer Card -->
      <div class="card timer-card" id="timer-card">
        <div class="ring-container">
          <div class="ring-pulse"></div>
          <svg class="ring-svg" viewBox="0 0 280 280" aria-hidden="true">
            <circle class="ring-bg"       cx="140" cy="140" r="125"/>
            <circle class="ring-progress" cx="140" cy="140" r="125" id="ring"/>
          </svg>
          <div class="timer-inner">
            <div class="timer-display" id="timer-display" aria-live="polite" aria-atomic="true">25:00</div>
            <div class="timer-mode-label" id="timer-mode-label">Focus Session</div>
          </div>
        </div>

        <!-- Controls -->
        <div class="timer-controls">
          <button class="btn-icon" id="btn-reset" onclick="resetTimer()" title="Reset (R)" aria-label="Reset timer">↺</button>
          <button class="btn-play" id="btn-play"  onclick="toggleTimer()" title="Start/Pause (Space)" aria-label="Start or pause timer">▶</button>
          <button class="btn-icon" id="btn-skip"  onclick="skipSession()" title="Skip (S)" aria-label="Skip session">⏭</button>
        </div>

        <!-- Session dots -->
        <div class="session-dots" id="session-dots" aria-label="Pomodoro sessions completed"></div>
      </div>

      <!-- Duration Control Card -->
      <div class="card settings-card" style="padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px;">
        <div style="font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted);" id="lbl-settings-title">
          Durations (min)
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
          <div style="display: flex; align-items: center; gap: 6px;">
            <label for="input-work-duration" style="font-size: 0.72rem; color: var(--text-muted); font-weight: 600;" id="lbl-input-work">Focus</label>

  </main>

  <!-- Footer -->
  <footer>
    <div id="lbl-shortcuts">
      <span class="kbd">Space</span> Start/Pause &nbsp;
      <span class="kbd">R</span> Reset &nbsp;

</div>

<!-- Toast -->
<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

<script>
  // ── Translations ───────────────────────────────────────────────────────
  const TRANSLATIONS = {
    en: {

      shortcuts: "<span class=\"kbd\">Espacio</span> Iniciar/Pausa &nbsp; <span class=\"kbd\">R</span> Reiniciar &nbsp; <span class=\"kbd\">S</span> Saltar",
      credits: "ChronoFocus · Patrocinado por Ely's Hot Chicken · Hecho con ❤️",
      toastCycleDone: "🎉 ¡4 sesiones listas! Toma un descanso largo.",
      toastSessionDone: "✅ ¡Sesión terminada! Hora de descansar.",
      toastBreakDone: "⏰ ¡Descanso terminado! ¿Listo para enfocarte?",
      toastTaskDone: '✅ ¡"{task}" completado!',
      likesLabel: "Le gusta",
      noTasksMsg: "No hay tareas activas",
      durationsTitle: "Duración (min)",
      durationsFocus: "Enfoque",

    },
    he: {

      longTab: "🍨 הפסקה ארוכה",

      sessions: "סשנים",
      tasksDone: "משימות שבוצעו",

      tasksTitle: "משימות",
      taskPlaceholder: "הוסף משימה…",
      taskEmpty: "הוסף משימות כדי להתרכז בהן במהלך הסשנים שלך",
      shortcuts: "<span class=\"kbd\">רווח</span> הפעל/השהה &nbsp; <span class=\"kbd\">R</span> איפוס &nbsp; <span class=\"kbd\">S</span> דילוג",
      credits: "ChronoFocus · בחסות Ely's Hot Chicken · נבנה באהבה ❤️",
      toastCycleDone: "🎉 4 סשנים הושלמו! קחו הפסקה ארוכה.",
      toastSessionDone: "✅ הסשן הסתיים! זמן להפסקה.",
      toastBreakDone: "⏰ ההפסקה הסתיימה! מוכנים להתרכז?",
      toastTaskDone: '✅ "{task}" הושלם!',
      likesLabel: "אוהב/ת",
      noTasksMsg: "אין משימות פעילות",
      durationsTitle: "מרווחים (דקות)",
      durationsFocus: "ריכוז",
      durationsShort: "קצרה",
      durationsLong: "ארוכה"
    },
    xh: {
      sponsor: "Ixhaswe yi-Ely's Hot Chicken",
      focusTab: "🍗 Gxila",
      shortTab: "🥤 Ikhefu Elifutshane",
      longTab: "🍨 Ikhefu Elide",
      focusLabel: "Iseshoni yokugxila",
      shortLabel: "Ikhefu Elifutshane",
      longLabel: "Ikhefu Elide",
      sessions: "Iiseshoni",
      tasksDone: "Imisebenzi Egityiweyo",
      focusTime: "Ixesha Lokugxila",
      dayStreak: "Ukungagqithelwa ziintsuku",
      tasksTitle: "Imisebenzi",
      taskPlaceholder: "Faka umsebenzi…",
      taskEmpty: "Faka imisebenzi ukuze ugxile kuyo ngexesha leeseshoni zakho",
      shortcuts: "<span class=\"kbd\">Space</span> Qala/Nqumama &nbsp; <span class=\"kbd\">R</span> Seta kabusha &nbsp; <span class=\"kbd\">S</span> Skip",
      credits: "ChronoFocus · Ixhaswe yi-Ely's Hot Chicken · Yakhiwe ngothando ❤️",
      toastCycleDone: "🎉 Iiseshoni ezi-4 zigityiwe! Thatha ikhefu elide.",
      toastSessionDone: "✅ Iseshoni igityiwe! Ixesha lekhefu.",
      toastBreakDone: "⏰ Ikhefu liphelile! Ukulungele ukugxila?",
      toastTaskDone: '✅ "{task}" igqityiwe!',
      likesLabel: "Uthanda",
      noTasksMsg: "Akukho misebenzi isebenzayo",
      durationsTitle: "Amaxesha (imiz)",
      durationsFocus: "Gxila",
      durationsShort: "Ifutshane",
      durationsLong: "Elide"
    }
  };

  // ── State ──────────────────────────────────────────────────────────────
  const MODES = {
    work:  { labelKey: 'focusLabel',  duration: 25 * 60, tabId: 'tab-work',  ringClass: '' },
    short: { labelKey: 'shortLabel',  duration:  5 * 60, tabId: 'tab-short', ringClass: 'short' },
    long:  { labelKey: 'longLabel',   duration: 15 * 60, tabId: 'tab-long',  ringClass: 'long' },
  };
  const SESSIONS_PER_CYCLE = 4;
  const RING_CIRC = 785.4;

  let mode       = 'work';
  let running    = false;
  let remaining  = MODES.work.duration;
  let totalSecs  = MODES.work.duration;
  let interval   = null;
  let sessionsToday  = 0;
  let focusMinutes   = 0;
  let tasksDone      = 0;
  let streak         = 0;
  let cycleSession   = 0; // 0–3
  let tasks          = [];
  let activeTaskId   = null;
  let toastTimeout   = null;
  let currentLanguage = localStorage.getItem('ely_hot_chicken_language') || 'en';

  // ── Language ────────────────────────────────────────────────────────────
  function setLanguage(lang) {
    currentLanguage = lang;
    localStorage.setItem('ely_hot_chicken_language', lang);
    
    // Toggle active state on buttons
    ['en', 'es', 'he', 'xh'].forEach(l => {
      const btn = document.getElementById(`lang-btn-${l}`);
      if (btn) btn.classList.toggle('active', l === lang);
    });

    // Update document dir for RTL support in Hebrew
    document.documentElement.dir = (lang === 'he') ? 'rtl' : 'ltr';
    document.documentElement.lang = lang;

    applyTranslations();
  }

  function applyTranslations() {
    const t = TRANSLATIONS[currentLanguage];
    if (!t) return;

    // Header & Info
    document.querySelector('.sponsor-badge').textContent = t.sponsor;
    document.getElementById('lbl-sessions').textContent = t.sessions;
    document.getElementById('lbl-tasks').textContent = t.tasksDone;
    document.getElementById('lbl-focus').textContent = t.focusTime;
    document.getElementById('lbl-streak').textContent = t.dayStreak;
    document.getElementById('lbl-tasks-title').textContent = t.tasksTitle;
    document.getElementById('task-input').placeholder = t.taskPlaceholder;
    document.getElementById('lbl-task-empty').textContent = t.taskEmpty;
    document.getElementById('lbl-shortcuts').innerHTML = t.shortcuts;
    document.getElementById('lbl-footer-credits').textContent = t.credits;

    // Tabs
    document.getElementById('tab-work').textContent = t.focusTab;
    document.getElementById('tab-short').textContent = t.shortTab;
    document.getElementById('tab-long').textContent = t.longTab;

    // Current Timer label
    const labelKey = MODES[mode].labelKey;
    document.getElementById('timer-mode-label').textContent = t[labelKey];

    // Durations labels
    document.getElementById('lbl-settings-title').textContent = t.durationsTitle;
    document.getElementById('lbl-input-work').textContent = t.durationsFocus;
    document.getElementById('lbl-input-short').textContent = t.durationsShort;
    document.getElementById('lbl-input-long').textContent = t.durationsLong;

    // Re-render tasks to update completed checkbox labels/aria
    renderTasks();
  }

  // Expose to window context
  window.setLanguage = setLanguage;

  // ── Timer Core ──────────────────────────────────────────────────────────
  function toggleTimer() {
    running ? pauseTimer() : startTimer();
  }

  function startTimer() {
    running = true;
    document.getElementById('btn-play').textContent = '⏸';
    document.getElementById('timer-card').classList.add('running');
    updateSessionDots();
    interval = setInterval(tick, 1000);
  }

  function pauseTimer() {
    running = false;
    document.getElementById('btn-play').textContent = '▶';
    document.getElementById('timer-card').classList.remove('running');
    clearInterval(interval);
  }

  function resetTimer() {
    pauseTimer();
    remaining = MODES[mode].duration;
    totalSecs  = remaining;
    updateDisplay();
    updateRing();
  }

  function skipSession() {
    pauseTimer();
    completeSession(false);
  }

  function tick() {
    remaining--;
    if (remaining <= 0) {
      remaining = 0;
      updateDisplay();
      updateRing();
      completeSession(true);
      return;
    }
    updateDisplay();
    updateRing();

    // Count focus minutes
    if (mode === 'work') {
      focusMinutes = Math.round((MODES.work.duration - remaining) / 60);
      updateStats();
    }
  }

  function completeSession(completed) {
    pauseTimer();
    playBeep(completed);

    const t = TRANSLATIONS[currentLanguage];

    if (mode === 'work' && completed) {
      sessionsToday++;
      cycleSession = (cycleSession + 1) % SESSIONS_PER_CYCLE;
      focusMinutes += Math.round(MODES.work.duration / 60);

      // Increment pomodoros on active task
      if (activeTaskId !== null) {
        const activeTask = tasks.find(tsk => tsk.id === activeTaskId);
        if (activeTask) { activeTask.pomodoros++; renderTasks(); }
      }

      updateStats();
      updateSessionDots();

      if (cycleSession === 0) {
        showToast(t.toastCycleDone);
        switchMode('long');
      } else {
        showToast(t.toastSessionDone);
        switchMode('short');
      }
    } else if (mode !== 'work' && completed) {
      showToast(t.toastBreakDone);
      switchMode('work');
    }
  }

  function playBeep(success) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = success ? [523.25, 659.25, 783.99] : [440, 349.23];
      notes.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.18);
        gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + i * 0.18 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.35);
        osc.start(ctx.currentTime + i * 0.18);
        osc.stop(ctx.currentTime + i * 0.18 + 0.4);
      });
    } catch(e) { /* Audio not available */ }
  }

  // ── Mode Switching ──────────────────────────────────────────────────────
  function switchMode(newMode) {
    pauseTimer();
    mode = newMode;
    remaining = MODES[mode].duration;
    totalSecs  = remaining;

    const t = TRANSLATIONS[currentLanguage];

    // Tab styles
    document.querySelectorAll('.mode-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === mode);
    });

    // Ring class
    const ring = document.getElementById('ring');
    ring.className = 'ring-progress ' + MODES[mode].ringClass;

    // Label
    const labelKey = MODES[mode].labelKey;
    document.getElementById('timer-mode-label').textContent = t[labelKey];

    updateDisplay();
    updateRing();
    updateSessionDots();
  }

  // ── Display ─────────────────────────────────────────────────────────────
  function updateDisplay() {
    const m = String(Math.floor(remaining / 60)).padStart(2, '0');
    const s = String(remaining % 60).padStart(2, '0');
    document.getElementById('timer-display').textContent = `${m}:${s}`;
    document.title = `${m}:${s} — Ely's Hot Chicken Focus Timer`;
  }

  function updateRing() {
    const pct = totalSecs > 0 ? remaining / totalSecs : 0;
    const offset = RING_CIRC * (1 - pct);
    document.getElementById('ring').style.strokeDashoffset = offset;
  }

  // Expose triggers
  window.switchMode = switchMode;
  window.toggleTimer = toggleTimer;
  window.resetTimer = resetTimer;
  window.skipSession = skipSession;

  function updateSessionDots() {
    const el = document.getElementById('session-dots');
    el.innerHTML = '';
    for (let i = 0; i < SESSIONS_PER_CYCLE; i++) {
      const dot = document.createElement('div');
      dot.className = 'session-dot';
      if (i < cycleSession) dot.classList.add('done');
      else if (i === cycleSession && mode === 'work' && running) dot.classList.add('current');
      el.appendChild(dot);
    }
  }

  // ── Stats ───────────────────────────────────────────────────────────────
  function updateStats() {
    const focusStr = focusMinutes >= 60
      ? `${Math.floor(focusMinutes/60)}h${focusMinutes%60}m`
      : `${focusMinutes}m`;

    document.getElementById('stat-sessions').textContent = sessionsToday;
    document.getElementById('stat-tasks').textContent    = tasksDone;
    document.getElementById('stat-focus').textContent    = focusStr;
    document.getElementById('stat-streak').textContent   = streak;
  }

  // ── Tasks ───────────────────────────────────────────────────────────────
  function addTask(e) {
    e.preventDefault();
    const input = document.getElementById('task-input');
    const text = input.value.trim();
    if (!text) return;

    const task = { id: Date.now(), text, done: false, pomodoros: 0 };
    tasks.unshift(task);

    // Auto-set as active if none active
    if (activeTaskId === null) activeTaskId = task.id;

    input.value = '';
    renderTasks();
  }
  window.addTask = addTask;

  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.done = !task.done;
    
    const t = TRANSLATIONS[currentLanguage];

    if (task.done) {
      tasksDone++;
      if (activeTaskId === id) {
        // Pick next undone task
        const next = tasks.find(tsk => !tsk.done && tsk.id !== id);
        activeTaskId = next ? next.id : null;
      }
      updateStats();
      showToast(t.toastTaskDone.replace('{task}', task.text));
    } else {
      tasksDone = Math.max(0, tasksDone - 1);
      updateStats();
    }
    renderTasks();
  }
  window.toggleTask = toggleTask;

  function setActive(id) {
    const task = tasks.find(t => t.id === id);
    if (!task || task.done) return;
    activeTaskId = activeTaskId === id ? null : id;
    renderTasks();
  }
  window.setActive = setActive;

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    if (activeTaskId === id) {
      const next = tasks.find(t => !t.done);
      activeTaskId = next ? next.id : null;
    }
    renderTasks();
  }
  window.deleteTask = deleteTask;

  function renderTasks() {
    const list = document.getElementById('task-list');
    const empty = document.getElementById('task-empty');
    const badge = document.getElementById('task-badge');

    const active = tasks.filter(t => !t.done);
    const done   = tasks.filter(t => t.done);
    const all    = [...active, ...done];

    badge.textContent = active.length;

    if (all.length === 0) {
      list.innerHTML = '';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    list.innerHTML = all.map(task => `
      <div class="task-item ${task.done ? 'done' : ''} ${task.id === activeTaskId && !task.done ? 'active-task' : ''}"
           role="listitem"
           onclick="setActive(${task.id})">
        <div class="task-check" onclick="event.stopPropagation(); toggleTask(${task.id})">
          ${task.done ? '✓' : ''}
        </div>
        <div class="task-text">${escapeHtml(task.text)}</div>
        ${task.pomodoros > 0 ? `<div class="task-pomodoros">🍗×${task.pomodoros}</div>` : ''}
        <button class="task-delete" onclick="event.stopPropagation(); deleteTask(${task.id})" aria-label="Delete task">✕</button>
      </div>
    `).join('');
  }

  // ── Toast ────────────────────────────────────────────────────────────────
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => toast.classList.remove('show'), 3500);
  }

  // ── Helpers ──────────────────────────────────────────────────────────────
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Duration settings listeners ──────────────────────────────────────────
  function setupDurationSettings() {
    const inputWork = document.getElementById('input-work-duration');
    const inputShort = document.getElementById('input-short-duration');
    const inputLong = document.getElementById('input-long-duration');

    if (inputWork) {
      inputWork.addEventListener('input', (e) => {
        const val = Math.max(1, parseInt(e.target.value) || 25);
        MODES.work.duration = val * 60;
        if (mode === 'work') resetTimer();
      });
    }
    if (inputShort) {
      inputShort.addEventListener('input', (e) => {
        const val = Math.max(1, parseInt(e.target.value) || 5);
        MODES.short.duration = val * 60;
        if (mode === 'short') resetTimer();
      });
    }
    if (inputLong) {
      inputLong.addEventListener('input', (e) => {
        const val = Math.max(1, parseInt(e.target.value) || 15);
        MODES.long.duration = val * 60;
        if (mode === 'long') resetTimer();
      });
    }
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  (function init() {
    const today = new Date().toDateString();
    const saved = JSON.parse(localStorage.getItem('chronofocus') || '{}');
    if (saved.date === today) {
      sessionsToday = saved.sessions || 0;
      focusMinutes  = saved.focusMinutes || 0;
      tasksDone     = saved.tasksDone || 0;
    }
    streak = saved.streak || 0;
    
    // Set initial language and populate translations
    setLanguage(currentLanguage);
    setupDurationSettings();

    updateDisplay();
    updateRing();
    updateStats();
    updateSessionDots();
    renderTasks();
  })();
</script>
